<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRFI Predictor — Daily Picks</title>
<style>
  :root {
    --bg:      #0d1117; --surface: #161b22; --border:  #30363d;
    --text:    #e6edf3; --muted:   #8b949e;
    --green:   #3fb950; --yellow:  #d29922; --red:     #f85149; --blue: #58a6ff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:14px; line-height:1.5; padding:24px 16px; }
  header { max-width:960px; margin:0 auto 24px;
    border-bottom:1px solid var(--border); padding-bottom:16px; }
  header h1 { font-size:22px; font-weight:600; }
  header .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  #app { max-width:960px; margin:0 auto; }

  .no-data { text-align:center; padding:80px 24px; color:var(--muted); }
  .no-data h2 { font-size:20px; margin-bottom:8px; color:var(--text); }
  code { background:rgba(255,255,255,.07); padding:2px 6px; border-radius:4px; font-size:12px; }

  .sec { font-size:12px; font-weight:600; text-transform:uppercase;
    letter-spacing:.05em; color:var(--muted); margin:24px 0 10px; }

  .card { background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:16px; margin-bottom:10px; }
  .card.rec   { border-color:var(--green); }
  .card.live  { border-color:var(--yellow); }
  .card.final { opacity:.7; }

  .ch { display:flex; justify-content:space-between; align-items:flex-start;
    gap:12px; margin-bottom:12px; }
  .mu { font-size:16px; font-weight:600; }
  .mus { font-size:12px; color:var(--muted); margin-top:2px; }
  .bdgs { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .bdg { font-size:11px; font-weight:600; border-radius:12px; padding:2px 8px; }
  .bg { background:rgba(63,185,80,.15);  color:var(--green);  border:1px solid rgba(63,185,80,.3);}
  .by { background:rgba(210,153,34,.15); color:var(--yellow); border:1px solid rgba(210,153,34,.3);}
  .bb { background:rgba(88,166,255,.15); color:var(--blue);   border:1px solid rgba(88,166,255,.3);}
  .bm { background:rgba(139,148,158,.1); color:var(--muted);  border:1px solid rgba(139,148,158,.2);}

  .fib { border-radius:6px; padding:8px 12px; margin-bottom:12px;
    font-size:13px; font-weight:600; }
  .fib-g { background:rgba(63,185,80,.1);  color:var(--green);  border:1px solid rgba(63,185,80,.3);}
  .fib-r { background:rgba(248,81,73,.1);  color:var(--red);    border:1px solid rgba(248,81,73,.3);}
  .fib-y { background:rgba(210,153,34,.1); color:var(--yellow); border:1px solid rgba(210,153,34,.3);}

  .hvs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  @media(max-width:520px){ .hvs { grid-template-columns:1fr; } }
  .hv { background:rgba(255,255,255,.03); border-radius:6px; padding:10px 12px; }
  .hl { font-size:11px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .hp { font-size:22px; font-weight:700; margin:4px 0; }
  .hpit { font-size:12px; color:var(--muted); }
  .br-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .bw { flex:1; background:rgba(255,255,255,.08); border-radius:4px; height:6px; overflow:hidden; }
  .bbar { height:100%; border-radius:4px; }
  .bbl { font-size:11px; color:var(--muted); min-width:36px; text-align:right; }

  .chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .chip { background:rgba(255,255,255,.05); border-radius:4px; padding:3px 8px;
    font-size:11px; color:var(--muted); }
  .chip b { font-weight:600; }
  .cg { color:var(--green); } .cy { color:var(--yellow); } .cr { color:var(--red); }

  .filt { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
  .fp { font-size:11px; color:var(--green); }
  .ff { font-size:11px; color:var(--red); }

  .tw { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:6px 10px; color:var(--muted); font-weight:600;
    font-size:11px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  td { padding:8px 10px; border-bottom:1px solid rgba(48,54,61,.5); }
  tr:hover td { background:rgba(255,255,255,.02); }
  .tr { text-align:right; font-variant-numeric:tabular-nums; }
  .tm { color:var(--muted); }

  footer { max-width:960px; margin:40px auto 0;
    border-top:1px solid var(--border); padding-top:12px;
    font-size:12px; color:var(--muted); }
</style>
</head>

</div>

(function(){
  const app=document.getElementById("app"),sub=document.getElementById("sub"),foot=document.getElementById("foot");
  if(!REPORT_DATA)return;
  const{date,games}=REPORT_DATA;
  sub.textContent=`${date}  ·  ${games.length} game${games.length!==1?"s":""} scored`;
  foot.textContent=`Model last updated: ${date}  ·  Data: MLB Stats API & Baseball Savant`;
  if(!games.length){
    app.innerHTML=`<div class="no-data"><h2>No games today</h2><p>Off-day or schedule not yet posted.</p></div>`;
    return;
  }
  let html="";
  const recs=games.filter(g=>g.bet_recommendation.recommended);
  if(recs.length){
    html+=`<div class="sec">★ Recommended Plays (${recs.length})</div>`;
    recs.slice(0,2).forEach(g=>{html+=card(g);});
  } else {
    html+=`<div class="sec" style="margin-top:0">No games cleared the full bet filter today</div>`;
  }
  html+=`<div class="sec">All Games — ranked by NRFI probability</div>`;
  html+=`<div class="tw"><table><thead><tr>
    <th>#</th><th>Matchup</th><th>Pitchers</th>
    <th class="tr">NRFI%</th><th class="tr">Top</th><th class="tr">Bot</th>
    <th>LU</th><th>State</th><th>Rec</th>
  </tr></thead><tbody>`;
  games.forEach((g,i)=>{
    html+=`<tr>
      <td class="tm">${i+1}</td>
      <td><b>${g.away_team}</b> @ <b>${g.home_team}</b></td>
      <td class="tm">${ln(g.away_pitcher)} / ${ln(g.home_pitcher)}</td>
      <td class="tr ${cl(g.nrfi_prob,.62,.55)}">${pct(g.nrfi_prob)}</td>
      <td class="tr tm">${pct(g.top_half.half_prob)}</td>
      <td class="tr tm">${pct(g.bot_half.half_prob)}</td>
      <td>${g.lineups_confirmed?"✓":"<span class='tm'>—</span>"}</td>
      <td>${std(g.game_state)}</td>
      <td>${g.bet_recommendation.recommended?"<b style='color:var(--green)'>YES</b>":"<span class='tm'>no</span>"}</td>
    </tr>`;
  });
  html+="</tbody></table></div>";
  html+=`<div class="sec">Detailed Breakdown — top 5</div>`;
  games.slice(0,5).forEach(g=>{html+=card(g);});
  app.innerHTML=html;
})();

function card(g){
  const rec=g.bet_recommendation,fi=g.first_inning||{},st=g.game_state||"pregame";
  let cls="card";
  if(rec.recommended)cls+=" rec";
  else if(st==="live")cls+=" live";
  else if(st==="final")cls+=" final";
  let fib="";
  const fr=fi.nrfi_result;
  if(fr==="NRFI")fib=`<div class="fib fib-g">✓ NRFI — No run scored in the 1st inning</div>`;
  else if(fr==="YRFI")fib=`<div class="fib fib-r">✗ YRFI — ${g.away_team} ${fi.away_r??0}, ${g.home_team} ${fi.home_r??0}</div>`;
  else if(fr==="bot_pending")fib=`<div class="fib fib-y">⏳ Top complete · Bottom in progress</div>`;
  else if(fr==="top_pending")fib=`<div class="fib fib-y">⏳ 1st inning in progress</div>`;
  const sc=st==="live"?"by":st==="final"?"bm":"bm",stx=st==="live"?"Live":st==="final"?"Final":"Pre-Game";
  let bdg=`<span class="bdg ${sc}">${stx}</span>`;
  if(rec.recommended)bdg+=`<span class="bdg bg">✓ Bet</span>`;
  bdg+=g.lineups_confirmed?`<span class="bdg bb">Lineups ✓</span>`:`<span class="bdg bm">Lineups pending</span>`;
  const hv=`<div class="hvs">${half("TOP 1st",g.away_pitcher,g.top_half)}${half("BOT 1st",g.home_pitcher,g.bot_half)}</div>`;
  const filt=`<div class="filt">
    ${rec.reasons_pass.map(r=>`<span class="fp">✓ ${r}</span>`).join("")}
    ${rec.reasons_fail.map(r=>`<span class="ff">✗ ${r}</span>`).join("")}
  </div>`;
  return `<div class="${cls}">
    <div class="ch">
      <div><div class="mu">${g.away_team} @ ${g.home_team}</div>
        <div class="mus">${g.venue_name}${g.game_time?" · "+fmt(g.game_time):""}</div></div>
      <div class="bdgs">${bdg}</div>
    </div>
    ${fib}${hv}
    <div class="chips"><span class="chip">NRFI <b class="${cl(g.nrfi_prob,.62,.55)}">${pct(g.nrfi_prob)}</b></span></div>
    ${filt}
  </div>`;
}

function half(lbl,pitcher,h){
  const prob=h.half_prob,w=Math.min(100,Math.round((prob-.60)/.35*100));
  const bc=prob>=.78?"var(--green)":prob>=.70?"var(--yellow)":"var(--red)";
  const s=h.scores||{};
  const sc=(n,v)=>v!=null?`<span class="chip">${n} <b class="${cl(v,.55,.45)}">${v.toFixed(3)}</b></span>`:"";
  return `<div class="hv">
    <div class="hl">${lbl}</div>
    <div class="hp ${cl(prob,.78,.70)}">${pct(prob)}</div>
    <div class="hpit">${ln(pitcher)} (${(pitcher&&pitcher.hand)||"?"}HP)</div>
    <div class="br-row">
      <div class="bw"><div class="bbar" style="width:${w}%;background:${bc}"></div></div>
      <div class="bbl">${pct(prob)}</div>
    </div>
    <div class="chips" style="margin-top:6px">
      ${sc("P",s.pitcher)}${sc("B",s.batter)}${sc("PW",s.park_weather)}${sc("DS",s.damage_speed)}
    </div>
  </div>`;
}

function pct(v){return v!=null?(v*100).toFixed(1)+"%":"—";}
function ln(x){return(x&&x.name)?x.name.split(" ").pop():"TBD";}
function cl(v,hi,mid){return v>=hi?"cg":v>=mid?"cy":"cr";}
function std(s){
  if(s==="live")return"<span style='color:var(--yellow)'>Live</span>";
  if(s==="final")return"<span class='tm'>Final</span>";
  return"<span class='tm'>Pre</span>";
}
function fmt(iso){
  try{return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York",timeZoneName:"short"});}
  catch{return"";}
}
