<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRFI Predictor — Daily Picks</title>
<style>
  :root {
    --bg:      #0d1117; --surface: #161b22; --border:  #30363d;
    --text:    #e6edf3; --muted:   #8b949e;
    --green:   #3fb950; --yellow:  #d29922; --red:     #f85149; --blue: #58a6ff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:14px; line-height:1.5; padding:24px 16px; }
  header { max-width:960px; margin:0 auto 24px;
    border-bottom:1px solid var(--border); padding-bottom:0; }
  header h1 { font-size:22px; font-weight:600; }
  header .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  #app,#tracker-app { max-width:960px; margin:0 auto; }

  /* ── Tabs ── */
  .tabs { display:flex; gap:0; margin-top:16px; }
  .tab { background:none; border:none; border-bottom:2px solid transparent;
    color:var(--muted); cursor:pointer; font-size:14px; font-weight:500;
    padding:8px 16px; transition:color .15s,border-color .15s; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--text); border-bottom-color:var(--blue); }

  .no-data { text-align:center; padding:80px 24px; color:var(--muted); }
  .no-data h2 { font-size:20px; margin-bottom:8px; color:var(--text); }
  code { background:rgba(255,255,255,.07); padding:2px 6px; border-radius:4px; font-size:12px; }

  .sec { font-size:12px; font-weight:600; text-transform:uppercase;
    letter-spacing:.05em; color:var(--muted); margin:24px 0 10px; }

  .card { background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:16px; margin-bottom:10px; }
  .card.rec   { border-color:var(--green); }
  .card.live  { border-color:var(--yellow); }
  .card.final { opacity:.7; }

  .ch { display:flex; justify-content:space-between; align-items:flex-start;
    gap:12px; margin-bottom:12px; }
  .mu { font-size:16px; font-weight:600; }
  .mus { font-size:12px; color:var(--muted); margin-top:2px; }
  .bdgs { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .bdg { font-size:11px; font-weight:600; border-radius:12px; padding:2px 8px; }
  .bg { background:rgba(63,185,80,.15);  color:var(--green);  border:1px solid rgba(63,185,80,.3);}
  .by { background:rgba(210,153,34,.15); color:var(--yellow); border:1px solid rgba(210,153,34,.3);}
  .bb { background:rgba(88,166,255,.15); color:var(--blue);   border:1px solid rgba(88,166,255,.3);}
  .bm { background:rgba(139,148,158,.1); color:var(--muted);  border:1px solid rgba(139,148,158,.2);}

  .fib { border-radius:6px; padding:8px 12px; margin-bottom:12px;
    font-size:13px; font-weight:600; }
  .fib-g { background:rgba(63,185,80,.1);  color:var(--green);  border:1px solid rgba(63,185,80,.3);}
  .fib-r { background:rgba(248,81,73,.1);  color:var(--red);    border:1px solid rgba(248,81,73,.3);}
  .fib-y { background:rgba(210,153,34,.1); color:var(--yellow); border:1px solid rgba(210,153,34,.3);}

  .hvs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  @media(max-width:520px){ .hvs { grid-template-columns:1fr; } }
  .hv { background:rgba(255,255,255,.03); border-radius:6px; padding:10px 12px; }
  .hl { font-size:11px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .hp { font-size:22px; font-weight:700; margin:4px 0; }
  .hpit { font-size:12px; color:var(--muted); }
  .br-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .bw { flex:1; background:rgba(255,255,255,.08); border-radius:4px; height:6px; overflow:hidden; }
  .bbar { height:100%; border-radius:4px; }
  .bbl { font-size:11px; color:var(--muted); min-width:36px; text-align:right; }

  .chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .chip { background:rgba(255,255,255,.05); border-radius:4px; padding:3px 8px;
    font-size:11px; color:var(--muted); }
  .chip b { font-weight:600; }
  .cg { color:var(--green); } .cy { color:var(--yellow); } .cr { color:var(--red); }

  .filt { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
  .fp { font-size:11px; color:var(--green); }
  .ff { font-size:11px; color:var(--red); }

  .tw { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:6px 10px; color:var(--muted); font-weight:600;
    font-size:11px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  td { padding:8px 10px; border-bottom:1px solid rgba(48,54,61,.5); }
  tr:hover td { background:rgba(255,255,255,.02); }
  .tr { text-align:right; font-variant-numeric:tabular-nums; }
  .tm { color:var(--muted); }

  /* ── Season Tracker ── */
  .record-bar { display:flex; align-items:center; gap:20px; flex-wrap:wrap;
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:16px 20px; margin-bottom:16px; }
  .rec-stat { text-align:center; }
  .rec-val { font-size:28px; font-weight:700; line-height:1; }
  .rec-lbl { font-size:11px; text-transform:uppercase; color:var(--muted);
    letter-spacing:.05em; margin-top:4px; }
  .rec-divider { width:1px; height:40px; background:var(--border); }
  .win-pct-bar { flex:1; min-width:160px; }
  .win-pct-track { background:rgba(255,255,255,.08); border-radius:4px;
    height:8px; overflow:hidden; margin-top:6px; }
  .win-pct-fill { height:100%; border-radius:4px; background:var(--green); transition:width .4s; }

  .result-w { color:var(--green); font-weight:700; }
  .result-l { color:var(--red);   font-weight:700; }
  .result-p { color:var(--muted); }

  footer { max-width:960px; margin:40px auto 0;
    border-top:1px solid var(--border); padding-top:12px;
    font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>⚾ NRFI Predictor</h1>
  <div class="sub" id="sub">No Run First Inning — Daily Model</div>
  <nav class="tabs">
    <button class="tab active" id="tab-today"   onclick="showTab('today')">Today's Picks</button>
    <button class="tab"        id="tab-tracker" onclick="showTab('tracker')">Season Tracker</button>
  </nav>
</header>
<div id="app">
  <div class="no-data">
    <h2>No report generated yet</h2>
    <p>Run <code>python main.py --html</code> to produce today's picks.</p>
  </div>
</div>
<div id="tracker-app" style="display:none"></div>
<footer id="foot"></footer>

// ── Season Tracker ────────────────────────────────────────────────────────────
// Odds helpers — American odds stored in localStorage keyed by game_pk
const _LS="nrfi_odds";
function _lsOdds(){try{return JSON.parse(localStorage.getItem(_LS)||"{}");}catch{return{};}}
function _saveOdds(pk,v){const o=_lsOdds();if(v==null)delete o[pk];else o[pk]=v;localStorage.setItem(_LS,JSON.stringify(o));}
function _profit(o){return o<0?100/Math.abs(o):o/100;}  // units won per unit wagered
function _calcU(o,r){if(o==null||!r||r==="pending")return null;return r==="NRFI"?_profit(o):-1;}
function _fmtO(v){if(v==null)return"—";return v>0?"+"+v:String(v);}
function _fmtU(u){if(u==null)return`<span class="tm">—</span>`;const s=(u>=0?"+":"")+u.toFixed(2)+"u";return`<span class="${u>=0?"cg":"cr"}">${s}</span>`;}

function renderTracker(){
  const ta=document.getElementById("tracker-app");
  const picks=(HISTORY_DATA&&HISTORY_DATA.picks)||[];
  if(!picks.length){
    ta.innerHTML=`<div class="no-data"><h2>No history yet</h2><p>Picks are recorded automatically each day.</p></div>`;
    return;
  }
  const allOdds=_lsOdds();

  // Aggregate — wins/losses + unit P/L per pick, per team
  let wins=0,losses=0,pending=0,totalU=0,oddsN=0;
  const teamMap={};
  picks.forEach(p=>{
    const odds=allOdds[p.game_pk]??p.odds??null;
    const u=_calcU(odds,p.result);
    if(p.result==="NRFI")wins++;
    else if(p.result==="YRFI")losses++;
    else pending++;
    if(u!==null){totalU+=u;oddsN++;}
    [p.away_team,p.home_team].forEach(t=>{
      if(!teamMap[t])teamMap[t]={w:0,l:0,u:0,n:0};
      if(p.result==="NRFI")teamMap[t].w++;
      else if(p.result==="YRFI")teamMap[t].l++;
      if(u!==null){teamMap[t].u+=u;teamMap[t].n++;}
    });
  });
  const decided=wins+losses;
  const winPct=decided?wins/decided:0;
  const roi=oddsN>0?(totalU/oddsN*100):null;

  const roiStr=roi!=null?`<span style="color:${roi>=0?"var(--green)":"var(--red)"}">${roi>=0?"+":""}${roi.toFixed(1)}%</span>`:`<span class="tm">—</span>`;
  const unitStr=oddsN>0?`<span style="color:${totalU>=0?"var(--green)":"var(--red)"}">${totalU>=0?"+":""}${totalU.toFixed(2)}u</span>`:`<span class="tm">—</span>`;

  // Summary record bar
  let html=`<div class="sec" style="margin-top:8px">Season Record</div>
  <div class="record-bar">
    <div class="rec-stat"><div class="rec-val cg">${wins}</div><div class="rec-lbl">Wins</div></div>
    <div class="rec-divider"></div>
    <div class="rec-stat"><div class="rec-val cr">${losses}</div><div class="rec-lbl">Losses</div></div>
    <div class="rec-divider"></div>
    <div class="rec-stat"><div class="rec-val tm">${pending}</div><div class="rec-lbl">Pending</div></div>
    <div class="rec-divider"></div>
    <div class="rec-stat"><div class="rec-val">${unitStr}</div><div class="rec-lbl">Units P/L</div></div>
    <div class="rec-divider"></div>
    <div class="rec-stat"><div class="rec-val">${roiStr}</div><div class="rec-lbl">ROI</div></div>
    <div class="rec-divider"></div>
    <div class="win-pct-bar">
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:12px;color:var(--muted)">Win %</span>
        <span style="font-size:14px;font-weight:700;color:${decided?winPct>=.55?"var(--green)":winPct>=.45?"var(--yellow)":"var(--red)":"var(--muted)"}">${decided?(winPct*100).toFixed(1)+"%":"—"}</span>
      </div>
      <div class="win-pct-track"><div class="win-pct-fill" style="width:${(winPct*100).toFixed(1)}%"></div></div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:16px">1 unit wagered per pick &nbsp;·&nbsp; Click any <b>Odds</b> cell to enter sportsbook price &nbsp;·&nbsp; ${oddsN} of ${decided} resolved picks have odds entered</div>`;

  // Daily picks log (newest first) — with Odds + Units columns
  const sorted=[...picks].sort((a,b)=>b.date.localeCompare(a.date)||a.rank-b.rank);
  html+=`<div class="sec">Daily Picks Log</div>
  <div class="tw"><table><thead><tr>
    <th>Date</th><th>#</th><th>Matchup</th><th>Pitchers</th>
    <th class="tr">NRFI%</th><th>LU</th><th class="tr">Odds</th><th class="tr">Units</th><th>Result</th>
  </tr></thead><tbody>`;
  sorted.forEach(p=>{
    const odds=allOdds[p.game_pk]??p.odds??null;
    const u=_calcU(odds,p.result);
    const res=p.result==="NRFI"?`<span class="result-w">W — NRFI</span>`:p.result==="YRFI"?`<span class="result-l">L — YRFI</span>`:`<span class="result-p">Pending</span>`;
    const oddsStyle=`cursor:pointer;color:${odds!=null?"var(--text)":"var(--muted)"};text-decoration:${odds==null?"underline dotted":"none"}`;
    html+=`<tr>
      <td class="tm">${p.date}</td>
      <td class="tm">#${p.rank}</td>
      <td><b>${p.away_team}</b> @ <b>${p.home_team}</b></td>
      <td class="tm">${lastName(p.away_pitcher)} / ${lastName(p.home_pitcher)}</td>
      <td class="tr ${clv(p.nrfi_prob,.62,.55)}">${(p.nrfi_prob*100).toFixed(1)}%</td>
      <td>${p.lineups_confirmed?"✓":"<span class='tm'>—</span>"}</td>
      <td class="tr odds-cell" data-pk="${p.game_pk}" onclick="editOdds(this)" style="${oddsStyle}" title="Click to enter sportsbook odds">${_fmtO(odds)}</td>
      <td class="tr">${_fmtU(u)}</td>
      <td>${res}</td>
    </tr>`;
  });
  html+="</tbody></table></div>";

  // Team standings — W/L/Win%/Units per team
  const teams=Object.entries(teamMap)
    .map(([t,r])=>({team:t,w:r.w,l:r.l,u:r.u,n:r.n,pct:r.w+r.l?r.w/(r.w+r.l):null}))
    .filter(r=>r.w+r.l>0)
    .sort((a,b)=>{
      if(a.pct==null&&b.pct==null)return 0;
      if(a.pct==null)return 1;
      if(b.pct==null)return -1;
      return b.pct-a.pct||b.w-a.w;
    });
  if(teams.length){
    html+=`<div class="sec">Team Standings</div>
    <div class="tw"><table><thead><tr>
      <th>Team</th><th class="tr">W</th><th class="tr">L</th><th class="tr">Win%</th><th class="tr">Units</th>
    </tr></thead><tbody>`;
    teams.forEach(r=>{
      const p=r.pct!=null?(r.pct*100).toFixed(1)+"%":"—";
      const pc=r.pct!=null?clv(r.pct,.55,.45):"tm";
      html+=`<tr>
        <td>${r.team}</td>
        <td class="tr cg">${r.w}</td>
        <td class="tr cr">${r.l}</td>
        <td class="tr ${pc}">${p}</td>
        <td class="tr">${r.n>0?_fmtU(r.u):"<span class='tm'>—</span>"}</td>
      </tr>`;
    });
    html+="</tbody></table></div>";
  }
  ta.innerHTML=html;
}
renderTracker();

// ── Odds inline editor ────────────────────────────────────────────────────────
function editOdds(cell){
  const pk=cell.dataset.pk;
  const cur=_lsOdds()[pk]??null;
  const inp=document.createElement("input");
  inp.type="text";inp.value=cur!=null?String(cur):"";
  inp.style.cssText="width:64px;background:var(--surface);color:var(--text);border:1px solid var(--blue);border-radius:4px;padding:2px 4px;font-size:13px;text-align:right;outline:none";
  inp.placeholder="-120";
  cell.innerHTML="";cell.appendChild(inp);inp.focus();inp.select();
  let committed=false;
  function commit(){
    if(committed)return;committed=true;
    const raw=inp.value.trim();
    if(raw===""){_saveOdds(pk,null);renderTracker();return;}
    const v=parseInt(raw,10);
    if(isNaN(v)||Math.abs(v)<100){
      // invalid — flash red, let user fix
      committed=false;
      inp.style.borderColor="var(--red)";
      inp.title="Enter American odds (e.g. -150 or +110)";
      inp.focus();
      return;
    }
    _saveOdds(pk,v);renderTracker();
  }
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){e.preventDefault();commit();}
    if(e.key==="Escape"){committed=true;renderTracker();}
  });
  inp.addEventListener("blur",commit);
}

// ── Shared helpers ────────────────────────────────────────────────────────────
function card(g){
  const rec=g.bet_recommendation,fi=g.first_inning||{},st=g.game_state||"pregame";
  let cls="card";
  if(rec.recommended)cls+=" rec";
  else if(st==="live")cls+=" live";
  else if(st==="final")cls+=" final";
  let fib="";
  const fr=fi.nrfi_result;
  if(fr==="NRFI")fib=`<div class="fib fib-g">✓ NRFI — No run scored in the 1st inning</div>`;
  else if(fr==="YRFI")fib=`<div class="fib fib-r">✗ YRFI — ${g.away_team} ${fi.away_r??0}, ${g.home_team} ${fi.home_r??0}</div>`;
  else if(fr==="bot_pending")fib=`<div class="fib fib-y">⏳ Top complete · Bottom in progress</div>`;
  else if(fr==="top_pending")fib=`<div class="fib fib-y">⏳ 1st inning in progress</div>`;
  const sc=st==="live"?"by":st==="final"?"bm":"bm",stx=st==="live"?"Live":st==="final"?"Final":"Pre-Game";
  let bdg=`<span class="bdg ${sc}">${stx}</span>`;
  if(rec.recommended)bdg+=`<span class="bdg bg">✓ Bet</span>`;
  bdg+=g.lineups_confirmed?`<span class="bdg bb">Lineups ✓</span>`:`<span class="bdg bm">Lineups pending</span>`;
  const hv=`<div class="hvs">${half("TOP 1st",g.away_pitcher,g.top_half)}${half("BOT 1st",g.home_pitcher,g.bot_half)}</div>`;
  const filt=`<div class="filt">
    ${rec.reasons_pass.map(r=>`<span class="fp">✓ ${r}</span>`).join("")}
    ${rec.reasons_fail.map(r=>`<span class="ff">✗ ${r}</span>`).join("")}
  </div>`;
  return `<div class="${cls}">
    <div class="ch">
      <div><div class="mu">${g.away_team} @ ${g.home_team}</div>
        <div class="mus">${g.venue_name}${g.game_time?" · "+fmt(g.game_time):""}</div></div>
      <div class="bdgs">${bdg}</div>
    </div>
    ${fib}${hv}
    <div class="chips"><span class="chip">NRFI <b class="${cl(g.nrfi_prob,.62,.55)}">${pct(g.nrfi_prob)}</b></span></div>
    ${filt}
  </div>`;
}

function half(lbl,pitcher,h){
  const prob=h.half_prob,w=Math.min(100,Math.round((prob-.60)/.35*100));
  const bc=prob>=.78?"var(--green)":prob>=.70?"var(--yellow)":"var(--red)";
  const s=h.scores||{};
  const sc=(n,v)=>v!=null?`<span class="chip">${n} <b class="${cl(v,.55,.45)}">${v.toFixed(3)}</b></span>`:"";
  return `<div class="hv">
    <div class="hl">${lbl}</div>
    <div class="hp ${cl(prob,.78,.70)}">${pct(prob)}</div>
    <div class="hpit">${ln(pitcher)} (${(pitcher&&pitcher.hand)||"?"}HP)</div>
    <div class="br-row">
      <div class="bw"><div class="bbar" style="width:${w}%;background:${bc}"></div></div>
      <div class="bbl">${pct(prob)}</div>
    </div>
    <div class="chips" style="margin-top:6px">
      ${sc("P",s.pitcher)}${sc("B",s.batter)}${sc("PW",s.park_weather)}${sc("DS",s.damage_speed)}
    </div>
  </div>`;
}

function pct(v){return v!=null?(v*100).toFixed(1)+"%":"—";}
function ln(x){return(x&&x.name)?x.name.split(" ").pop():"TBD";}
function lastName(s){return s?(s.split(" ").pop()||s):"TBD";}
function cl(v,hi,mid){return v>=hi?"cg":v>=mid?"cy":"cr";}
function clv(v,hi,mid){return v>=hi?"cg":v>=mid?"cy":"cr";}
function std(s){
  if(s==="live")return"<span style='color:var(--yellow)'>Live</span>";
  if(s==="final")return"<span class='tm'>Final</span>";
  return"<span class='tm'>Pre</span>";
}
function fmt(iso){
  try{return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York",timeZoneName:"short"});}
  catch{return"";}
}
