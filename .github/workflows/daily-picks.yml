name: Daily NRFI Picks

on:
  schedule:
    # Every hour 11 AM – 7 PM EDT (15:00–23:00 UTC)
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    # 8 PM EDT = 00:00 UTC (next calendar day)
    - cron: "0 0 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NRFI model
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        # Exit 0 = recommended plays found, 2 = no recommended plays, 1 = no games today
        run: python main.py --save --html || true

      - name: Commit and push updated picks
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "NRFI picks $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
