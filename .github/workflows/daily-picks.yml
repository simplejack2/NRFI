name: Daily NRFI Picks

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/daily-picks.yml"
  schedule:
    # 11 AM – 9:30 PM EDT = 15:00 – 01:30 UTC
    # Hourly 11–12 PM (early lineup checks), then every 30 min through 9:30 PM
    # to catch the lineup-confirmed → game-start window for all time zones.
    # Late west coast games start ~10:05 PM ET; lineups post ~7 PM ET,
    # so our 01:30 UTC run covers them before the 02:05 UTC first pitch.
    - cron: "0  15 * * *"   # 11:00 AM EDT
    - cron: "0  16 * * *"   # 12:00 PM EDT
    - cron: "0  17 * * *"   # 01:00 PM EDT
    - cron: "30 17 * * *"   # 01:30 PM EDT
    - cron: "0  18 * * *"   # 02:00 PM EDT
    - cron: "30 18 * * *"   # 02:30 PM EDT
    - cron: "0  19 * * *"   # 03:00 PM EDT
    - cron: "30 19 * * *"   # 03:30 PM EDT
    - cron: "0  20 * * *"   # 04:00 PM EDT
    - cron: "30 20 * * *"   # 04:30 PM EDT
    - cron: "0  21 * * *"   # 05:00 PM EDT
    - cron: "30 21 * * *"   # 05:30 PM EDT
    - cron: "0  22 * * *"   # 06:00 PM EDT
    - cron: "30 22 * * *"   # 06:30 PM EDT
    - cron: "0  23 * * *"   # 07:00 PM EDT
    - cron: "30 23 * * *"   # 07:30 PM EDT
    - cron: "0   0 * * *"   # 08:00 PM EDT
    - cron: "30  0 * * *"   # 08:30 PM EDT
    - cron: "0   1 * * *"   # 09:00 PM EDT
    - cron: "30  1 * * *"   # 09:30 PM EDT
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate picks
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py --html --verbose

      - name: Diagnose odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          echo "=== Odds diagnostic ==="
          python - <<'PYEOF'
          import json, os, sys
          sys.path.insert(0, ".")
          from datetime import date
          today = date.today().isoformat()

          # Show what ended up in history.json for today
          try:
              h = json.load(open("data/history.json"))
              today_picks = [p for p in h["picks"] if p.get("date") == today]
              print(f"Today's picks ({today}):")
              for p in today_picks:
                  odds = p.get("odds")
                  print(f"  #{p['rank']} {p['away_team']} @ {p['home_team']}  odds={odds}")
              if not today_picks:
                  print("  (none)")
          except Exception as e:
              print(f"  Could not read history: {e}")

          print()
          key = os.environ.get("ODDS_API_KEY", "")
          print(f"ODDS_API_KEY set: {'yes (len=' + str(len(key)) + ')' if key else 'NO'}")
          PYEOF

      - name: Verify injection
        run: |
          echo "--- index.html REPORT_DATA line ---"
          grep "REPORT_DATA" index.html | head -1
          echo "---"
          if grep -q "INJECTED_BY_REPORTER" index.html; then
            echo "ERROR: index.html was not updated by main.py"
            exit 1
          fi
          python -c "
          import re, json
          html = open('index.html').read()
          m = re.search(r'REPORT_DATA = (.*?); // generated', html)
          if not m:
            print('ERROR: could not parse injected data')
            exit(1)
          d = json.loads(m.group(1))
          games = d.get('games', [])
          print(f'Date: {d[\"date\"]}  Games: {len(games)}')
          for g in games[:3]:
            rec = g['bet_recommendation']['recommended']
            print(f'  {g[\"away_team\"]} @ {g[\"home_team\"]}  NRFI={g[\"nrfi_prob\"]:.1%}  rec={rec}')
          if not games:
            print('  (no games today or API returned empty)')
          "

      - name: Publish to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          [ -f data/history.json ] && git add data/history.json || true
          git diff --staged --quiet && echo "index.html unchanged (already up to date)" || (
            git commit -m "NRFI picks $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git pull --rebase origin main &&
            git push origin HEAD:main
          )
