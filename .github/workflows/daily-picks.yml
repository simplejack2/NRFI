name: Daily NRFI Picks

on:
  schedule:
    # Every hour 11 AM – 7 PM EDT (15:00–23:00 UTC)
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    # 8 PM EDT = 00:00 UTC (next calendar day)
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run NRFI model
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python main.py --save --html
          echo "Exit code: $?"
        # Exit 0 = plays found, 2 = no plays (still success), 1 = no games today
        # We catch all of these — let the next step show us what happened
        continue-on-error: true

      - name: Verify index.html was updated
        run: |
          if grep -q 'INJECTED_BY_REPORTER' index.html; then
            echo "ERROR: index.html still has null placeholder — script did not inject data"
            echo "--- Last 5 lines of any error output ---"
            exit 1
          else
            echo "index.html updated successfully"
            python -c "
          import re, json
          html = open('index.html').read()
          m = re.search(r'const REPORT_DATA = (\{.*?\}); //', html)
          if m:
              d = json.loads(m.group(1))
              print(f'Date: {d[\"date\"]}  Games: {len(d[\"games\"])}')
              for g in d['games'][:3]:
                  print(f'  {g[\"away_team\"]} @ {g[\"home_team\"]}  NRFI={g[\"nrfi_prob\"]:.1%}  state={g[\"game_state\"]}')
            "
          fi

      - name: Commit and push updated picks
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "NRFI picks $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
