name: Daily NRFI Picks

on:
  schedule:
    # 11:00 AM EDT (UTC-4) = 15:00 UTC — covers the full MLB season (Apr–Oct)
    - cron: "0 15 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Silence Node.js 20 deprecation warnings

permissions:
  contents: write      # Needed to commit & push index.html

jobs:
  generate-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NRFI model
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        # Exit codes: 0 = recommended plays found, 2 = no recommended plays (still success)
        # Exit code 1 = no games scheduled today (off-season etc.) — treat as success too
        run: python main.py --save --html || true

      - name: Commit and push updated picks
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/ 2>/dev/null || true
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "NRFI picks $(date -u +%Y-%m-%d)"
          git push
